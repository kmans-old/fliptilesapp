<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>FTA-Master-JSON-v29</title>
<style>
  :root{
    --bg:#f5f7fb;
    --panel:#ffffff;
    --border:#c7ccd6;
    --border2:#aeb5c2;
    --text:#0f172a;
    --muted:#64748b;
    --blue:#2563eb;
    --danger:#ef4444;

    --tile:140px;
    --gap:8px;
    --radius:16px;

    --btn:26px;
    --btnR: 8px;
    --icon:16px;
    --badge:22px;

    --chipH:34px;
    --chipR:10px;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    background:var(--bg);
    color:var(--text);
  }

  .topbar-wrap{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(245,247,251,.92);
    backdrop-filter:saturate(1.3) blur(10px);
    border-bottom:1px solid rgba(199,204,214,.8);
  }
  .topbar{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    padding: 8px 10px;
    max-width:2200px;
    margin:0 auto;
  }
  .chip{
    height:var(--chipH);
    border-radius:var(--chipR);
    border:2px solid var(--border2);
    background:var(--panel);
    color:var(--text);
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:0 10px;
    font-weight:650;
    letter-spacing:.2px;
    user-select:none;
    white-space:nowrap;max-width:calc(100% - 60px);overflow:hidden;text-overflow:ellipsis;
    font-size:14px;
  }
  button.chip{cursor:pointer}
  button.chip:active{transform:translateY(1px)}
  .chip.small{font-weight:600; color:var(--muted); border-color:var(--border)}
  .chip.primary{
    background:var(--blue);
    color:#fff;
    border-color:var(--border2);
  }
  .chip.danger{
    background:rgba(239,68,68,.10);
    border-color:rgba(239,68,68,.55);
  }
  .chip.icon{
    min-width:44px;
    justify-content:center;
    padding:0;
  }
  .stepper{display:inline-flex; align-items:center; gap:8px;}
  .stepper .chip.small{min-width:110px; justify-content:center}

  .searchRow{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }
  .searchChip{
    display:inline-flex;
    align-items:center;
    height:var(--chipH);
    border-radius:var(--chipR);
    border:2px solid var(--border);
    background:var(--panel);
    padding:0 8px;
    gap:8px;
    font-size:14px;
  }
  .searchChip label{
    color:var(--muted);
    font-weight:650;
    min-width:36px;
  }
  .searchChip input{
    border:0;
    outline:none;
    background:transparent;
    color:var(--text);
    font:inherit;
    width:120px;
  }
  .nrChip input{width:64px}
  .textChip input{width:140px}

  .grid-wrap{
    max-width:2200px;
    margin:12px auto 26px;
    padding:0 12px 30px;
  }
  .grid{
    display:grid;
    gap:var(--gap);
    grid-template-columns:repeat(auto-fill, minmax(var(--tile), 1fr));
    align-items:start;
  }

  .tile{
    background:var(--panel);
    border:2px solid var(--border2);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 8px 22px rgba(0,0,0,.12);
    position:relative;
    min-width:var(--tile);
  }
  .tile-inner{display:flex; flex-direction:column;}
  .square{
    width:100%;
    aspect-ratio:1/1;
    background:rgba(37,99,235,.06);
    border-bottom:2px solid var(--border);
    position:relative;
    cursor:pointer;
    user-select:none;
  }
  .panel-inset{
    position:absolute;
    inset:10px;
    border:2px dashed rgba(37,99,235,.40);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:0;
    text-align:center;
  }
  .panel-inset img{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:10px;
  }
  .placeholder{
    color:var(--muted);
    font-weight:650;
    font-size:13px;
    line-height:1.15;
  }
  .textview{
    width:100%;
    height:100%;
    overflow:auto;
    white-space:pre-wrap;
    word-break:break-word;
    font-size:clamp(13px, calc(var(--tile) * 0.10), 20px);
    font-weight:650;
    line-height:1.22;
    padding:4px;
  }
  .hidden{display:none !important}

  .badge{z-index:3;
    position:absolute;
    left:10px;
    bottom:10px;
    width:var(--badge);
    height:var(--badge);
    border-radius:999px;
    border:2px solid var(--border2);
    background:var(--panel);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:calc(var(--badge) * 0.55);
    box-shadow:0 4px 10px rgba(0,0,0,.16);
    user-select:none;
    pointer-events:none;
  }

  .name-inset{z-index:3;
    position:absolute;
    left:calc(10px + var(--badge) + 6px);
    right:10px;
    bottom:10px;
    font-size:12px;
    font-weight:600;
    line-height:1.1;
    color:#111;
    text-shadow:0 1px 0 rgba(255,255,255,.8);
    white-space:nowrap;max-width:calc(100% - 60px);overflow:hidden;text-overflow:ellipsis;
    overflow:hidden;
    text-overflow:ellipsis;
    pointer-events:none;
  }

  
  .icons{
    padding:8px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
  }
  .icons-left,.icons-right{display:flex; align-items:center; gap:8px;}
  .ibtn{
    width:var(--btn);
    height:var(--btn);
    border-radius:var(--btnR);
    border:2px solid var(--border2);
    background:var(--panel);
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:0;
    flex:0 0 auto;
  }
  .ibtn:active{transform:translateY(1px)}
  .ibtn svg{width:var(--icon); height:var(--icon); stroke:var(--text)}
  .ibtn.danger{
    border-color:rgba(239,68,68,.70);
    background:rgba(239,68,68,.10);
  }

  @media (max-width: 520px){
    .topbar{gap:6px}
    .chip{padding:0 8px}
    .searchChip input{width:110px}
    .textChip input{width:120px}
  }

  /* Edit modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:50;padding:14px;}
  .modal-card{background:#fff;border-radius:18px;max-width:920px;width:min(920px,96vw);box-shadow:0 18px 50px rgba(0,0,0,.25);border:2px solid var(--border2);}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 16px 8px;}
  .modal-title{font-size:28px;font-weight:800;}
  .modal-body{padding:0 16px 10px;}
  .modal-label{display:block;font-size:14px;font-weight:700;margin:8px 0 6px;}
  .modal-input,.modal-textarea{width:100%;border:2px solid var(--border2);border-radius:14px;padding:12px 14px;font-size:18px;outline:none;}
  .modal-textarea{min-height:240px;resize:vertical;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;padding:10px 16px 16px;}

  .nameTag{max-width: calc(100% - 160px); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 10px; height:26px; line-height:26px; border:1px solid var(--border2); border-radius:999px; background:#fff; font-size:12px; color:#111;}
  body.dark .nameTag{background:#1f242b; color:#e8eef7;}
</style>
</head>
<body>
  <div class="topbar-wrap">
    <div class="topbar">
      <div class="chip" id="ftaCode">FTA001T</div>
      <button class="chip" id="btnStartLink">Start-link</button>

      <button class="chip primary" id="btnAdd">Extra tegel</button>
      <button class="chip" id="btnRenumber">Hernummer</button>

      <div class="stepper">
        <button class="chip icon" id="btnSmaller" title="Kleiner">−</button>
        <div class="chip small" id="sizeLabel">Grootte 140</div>
        <button class="chip icon" id="btnBigger" title="Groter">+</button>
      </div>

      <button class="chip" id="btnAllPhoto">Alles foto</button>
      <button class="chip" id="btnAllText">Alles tekst</button>

      <div class="searchRow" aria-label="Zoeken">
        <div class="searchChip nrChip">
          <label for="nrSearch">Nr</label>
          <input id="nrSearch" placeholder="bv. 12" inputmode="numeric" />
        </div>
        <div class="searchChip nameChip">
          <label for="nameSearch">Naam</label>
          <input id="nameSearch" placeholder="bv. fiets" />
        </div>
        <div class="searchChip textChip">
          <label for="textSearch">Tekst</label>
          <input id="textSearch" placeholder="woord..." />
        </div>
      </div>

      <div class="chip small" id="counts">Tegels 1 · Foto's 0 · Teksten 0</div>
      <button class="chip primary" id="btnSave">Opslaan (JSON)</button>
      <button class="chip" id="btnLoad">Laden (JSON)</button>
      <button class="chip danger" id="btnTrash">Prullenbak ( 0 )</button>

      <input class="hidden" type="file" id="fileLoader" accept="application/json,.json" />
      <input class="hidden" type="file" id="photoLoader" accept="image/*" />
    </div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="hidden" id="trashModal" style="position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; display:none; align-items:center; justify-content:center; padding:16px;">
    <div style="width:min(920px,100%); max-height:min(82vh,920px); overflow:auto; background:var(--panel); border:2px solid var(--border2); border-radius:18px; box-shadow:0 20px 80px rgba(0,0,0,.50); padding:14px;">
      <div style="display:flex; justify-content:space-between; align-items:center; gap: 6px; padding:2px 6px;">
        <h2 style="margin:0; font-size:18px;">Prullenbak</h2>
        <div style="display:flex; gap:10px; align-items:center;">
          <button class="chip" id="btnCloseTrash">Sluiten</button>
          <button class="chip danger" id="btnEmptyTrash">Leeg prullenbak</button>
        </div>
      </div>
      <div id="trashList" style="display:grid; gap:10px; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); padding:6px;"></div>
    </div>
  
  <div id="editModal" class="modal-backdrop" style="display:none">
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Tegel bewerken">
      <div class="modal-head">
        <div class="modal-title" id="editModalTitle">Tegel</div>
        <button class="chip btn" id="editCloseTop" type="button">Sluiten</button>
      </div>

      <div class="modal-body">
        <label class="modal-label">Tegelnaam (optioneel)</label>
        <input id="editName" class="modal-input" type="text" maxlength="80" placeholder="Tegelnaam (optioneel)" />

        <label class="modal-label" style="margin-top:10px">Tekst</label>
        <textarea id="editText" class="modal-textarea" placeholder="Typ hier je tekst..." rows="10"></textarea>
      </div>

      <div class="modal-actions">
        <button class="chip btn" id="editCancel" type="button">Annuleren</button>
        <button class="chip btn danger" id="editClear" type="button">Leegmaken</button>
        <button class="chip btn primary" id="editSave" type="button">Opslaan</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const MIN_TILE = 90;
  const MAX_TILE = 320;
  const DEFAULT_TILE = 140;

  function $(sel, root=document){ return root.querySelector(sel); }
  function clamp(x,a,b){ return Math.max(a, Math.min(b,x)); }
  function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }

  function scaleFromTile(tile){
    const t = tile;
    const btn  = Math.round(clamp(t * 0.16, 22, 32));
    const icon = Math.round(clamp(btn * 0.58, 12, 18));
    const badge= Math.round(clamp(t * 0.14, 18, 28));
    const gap  = Math.round(clamp(t * 0.04, 5, 10));
    const radius = Math.round(clamp(t * 0.10, 14, 18));
    return {btn, icon, badge, gap, radius};
  }

  const state = {
    v: 29,
    tileSize: DEFAULT_TILE,
    tiles: [],
    trash: []
  };

  const grid = $("#grid");
  const counts = $("#counts");
  const btnTrash = $("#btnTrash");
  const sizeLabel = $("#sizeLabel");
  const ftaCode = $("#ftaCode");
  const btnStartLink = $("#btnStartLink");

  const nrSearch = $("#nrSearch");
  const nameSearch = $("#nameSearch");
  const textSearch = $("#textSearch");

  const fileLoader = $("#fileLoader");
  const photoLoader = $("#photoLoader");
  let pendingPhotoTileId = null;

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function applyTileSize(px){
    state.tileSize = Math.round(clamp(px, MIN_TILE, MAX_TILE));
    document.documentElement.style.setProperty("--tile", state.tileSize + "px");
    const s = scaleFromTile(state.tileSize);
    document.documentElement.style.setProperty("--btn", s.btn + "px");
    document.documentElement.style.setProperty("--btnR", Math.round(s.btn * 0.42) + "px");
    document.documentElement.style.setProperty("--icon", s.icon + "px");
    document.documentElement.style.setProperty("--badge", s.badge + "px");
    document.documentElement.style.setProperty("--gap", s.gap + "px");
    document.documentElement.style.setProperty("--radius", s.radius + "px");
    sizeLabel.textContent = "Grootte " + state.tileSize;
  }

  function normalizeIds(){
    state.tiles.forEach((t,i) => t.id = i+1);
  }

  function updateHeader(){
    const total = state.tiles.length;
    const code = "FTA" + String(total).padStart(3,"0") + "T";
    ftaCode.textContent = code;

    let photos = 0, texts = 0;
    for (const t of state.tiles){
      if (t.imgDataUrl) photos++;
      if (t.text && t.text.trim().length) texts++;
    }
    counts.textContent = `Tegels ${total} · Foto's ${photos} · Teksten ${texts}`;
    btnTrash.textContent = `Prullenbak ( ${state.trash.length} )`;
  }

  function matchesSearch(tile){
    const qNr = (nrSearch.value||"").trim().replace(/\D+/g,"").slice(0,3);
    const qName = (nameSearch.value||"").trim().toLowerCase();
    const qText = (textSearch.value||"").trim().toLowerCase();

    if (!qNr && !qName && !qText) return true;
    if (qNr && String(tile.id) !== qNr) return false;
    if (qName && !(tile.name||"").toLowerCase().includes(qName)) return false;
    if (qText && !(tile.text||"").toLowerCase().includes(qText)) return false;
    return true;
  }

  function iconCamera(){ return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 7h4l2-2h4l2 2h4v12H4V7Z"/><path d="M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/></svg>`; }
  function iconText(){ return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h10"/></svg>`; }
  function iconTrash(){ return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M7 6l1 16h8l1-16"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>`; }
  function iconX(){ return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>`; }

  function tileEl(tile){
    const wrap = document.createElement("div");
    wrap.className = "tile";
    wrap.dataset.id = tile.id;

    const hasText = !!(tile.text && tile.text.trim().length);

    wrap.innerHTML = `
      <div class="tile-inner">
        <div class="square" title="Klik om te flippen (foto/tekst)">
          <div class="badge">${tile.id}</div>
          <div class="name-inset">${escapeHtml(tile.name||"")}</div>

          <div class="panel-inset photo ${tile.flipped ? "hidden" : ""}">
            ${tile.imgDataUrl ? `<img alt="foto" src="${tile.imgDataUrl}">` : `<div class="placeholder">Geen foto</div>`}
          </div>

          <div class="panel-inset text ${tile.flipped ? "" : "hidden"}">
            ${hasText ? `<div class="textview">${escapeHtml(tile.text)}</div>` : `<div class="placeholder">Geen tekst</div>`}
          </div>
        </div>
<div class="icons">
          <div class="icons-left">
            <button class="ibtn" data-act="photo" title="Foto kiezen">${iconCamera()}</button>
            <button class="ibtn" data-act="photoClear" title="Foto verwijderen">${iconX()}</button>
            <button class="ibtn" data-act="textEdit" title="Tegelnaam + Tekst">${iconText()}</button>
          </div>
          <div class="icons-right">
            <button class="ibtn danger" data-act="del" title="Naar prullenbak">${iconTrash()}</button>
          </div>
        </div>
      </div>
    `;

    $(".square", wrap).addEventListener("click", () => {
      tile.flipped = !tile.flipped;
      render();
    });

    wrap.addEventListener("click", (e) => {
      const btn = e.target.closest(".ibtn");
      if (!btn) return;
      e.stopPropagation();
      const act = btn.dataset.act;

      if (act === "photo"){
        pendingPhotoTileId = tile.id;
        photoLoader.value = "";
        photoLoader.click();
        return;
      }
      if (act === "photoClear"){
        tile.imgDataUrl = null;
        render();
        return;
      }
      if (act === "textEdit"){
      openEditModal(tile.id);
      return;
    }
      if (act === "del"){
        const idx = state.tiles.findIndex(t => t.id === tile.id);
        if (idx >= 0){
          const removed = state.tiles.splice(idx,1)[0];
          state.trash.unshift({...removed, deletedAt: new Date().toISOString()});
          normalizeIds();
          render();
        }
        return;
      }
    });

    return wrap;
  }

  function render(){
    grid.innerHTML = "";
    for (const t of state.tiles){
      if (matchesSearch(t)) grid.appendChild(tileEl(t));
    }
    updateHeader();
  }

  async function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(new Error("read_error"));
      reader.readAsDataURL(file);
    });
  }

  function exportJson(){
    const payload = {
      v: state.v,
      exportedAt: new Date().toISOString(),
      tileSize: state.tileSize,
      tiles: state.tiles.map(t => ({
        id: t.id,
        name: t.name || "",
        text: t.text || "",
        imgDataUrl: t.imgDataUrl || null,
        flipped: !!t.flipped
      }))
    };
    const filename = `${ftaCode.textContent}-export.json`;
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 800);
  }

  async function importJsonFile(file){
    let data;
    try{ data = JSON.parse(await file.text()); }
    catch{ alert("Dit JSON-bestand kan niet gelezen worden."); return; }

    if (!data || !Array.isArray(data.tiles)){
      alert("Dit JSON-bestand lijkt geen FTA-export.");
      return;
    }

    applyTileSize(Number(data.tileSize) || DEFAULT_TILE);
    state.tiles = data.tiles.map((t,i) => ({
      id: i+1,
      _uid: uid(),
      name: (t.name ?? ""),
      text: (t.text ?? ""),
      imgDataUrl: (t.imgDataUrl ?? null),
      flipped: !!t.flipped
    }));
    state.trash = [];
    render();
  }

  const trashModal = $("#trashModal");

  const editModal = $("#editModal");
  const editModalTitle = $("#editModalTitle");
  const editName = $("#editName");
  const editText = $("#editText");
  const editCloseTop = $("#editCloseTop");
  const editCancel = $("#editCancel");
  const editClear = $("#editClear");
  const editSave = $("#editSave");
  let editingId = null;

  function openEditModal(id){
    const tile = state.tiles.find(t=>t.id===id);
    if(!tile) return;
    editingId = id;
    editModalTitle.textContent = "Tegel " + id;
    editName.value = tile.name || "";
    editText.value = tile.text || "";
    editModal.style.display = "flex";
    setTimeout(()=>editName.focus(), 0);
  }
  function closeEditModal(){
    editModal.style.display = "none";
    editingId = null;
  }
  function applyEdit(saveChanges){
    if(!editingId) { closeEditModal(); return; }
    const tile = state.tiles.find(t=>t.id===editingId);
    if(!tile) { closeEditModal(); return; }
    if(saveChanges){
      tile.name = (editName.value || "").trim();
      tile.text = (editText.value || "");
      render();
    }
    closeEditModal();
  }

  editCloseTop.addEventListener("click", ()=>applyEdit(false));
  editSave.addEventListener("click", ()=>applyEdit(true));
  editCancel.addEventListener("click", ()=>applyEdit(false));
  editClear.addEventListener("click", ()=>{
    editName.value = "";
    editText.value = "";
    editName.focus();
  });
  editModal.addEventListener("click", (e)=>{
    if(e.target === editModal) applyEdit(false);
  });
  window.addEventListener("keydown",(e)=>{
    if(e.key==="Escape" && editModal.style.display==="flex") applyEdit(false);
  });

  const trashList = $("#trashList");
  $("#btnTrash").addEventListener("click", () => {
    renderTrash();
    trashModal.style.display = "flex";
  });
  $("#btnCloseTrash").addEventListener("click", () => { trashModal.style.display = "none"; });
  $("#btnEmptyTrash").addEventListener("click", () => { state.trash = []; renderTrash(); updateHeader(); });
  trashModal.addEventListener("click", (e) => { if (e.target === trashModal) trashModal.style.display="none"; });

  function renderTrash(){
    trashList.innerHTML = "";
    if (!state.trash.length){
      const div = document.createElement("div");
      div.style.padding = "10px";
      div.style.color = "var(--muted)";
      div.textContent = "Prullenbak is leeg.";
      trashList.appendChild(div);
      return;
    }
    for (const item of state.trash){
      const card = document.createElement("div");
      card.style.border = "2px solid var(--border)";
      card.style.borderRadius = "14px";
      card.style.padding = "10px";
      card.style.display = "flex";
      card.style.flexDirection = "column";
      card.style.gap = "10px";

      const hasPhoto = !!item.imgDataUrl;
      const hasText = !!(item.text && item.text.trim());

      card.innerHTML = `
        <div style="font-weight:750;">Tegel ${item.id}</div>
        <div style="border:2px dashed var(--border); border-radius:12px; padding:8px; min-height:74px; color:var(--muted); overflow:hidden;">
          ${hasPhoto ? "Foto aanwezig" : (hasText ? escapeHtml(item.text).slice(0,140) : "Leeg")}
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="chip" data-act="restore">Herstellen</button>
          <button class="chip danger" data-act="remove">Definitief weg</button>
        </div>
      `;
      card.addEventListener("click", (e) => {
        const b = e.target.closest("button");
        if (!b) return;
        const act = b.dataset.act;
        if (act === "restore"){
          const idx = state.trash.indexOf(item);
          const restored = state.trash.splice(idx,1)[0];
          state.tiles.push({
            id: state.tiles.length+1,
            _uid: uid(),
            name: restored.name || "",
            text: restored.text || "",
            imgDataUrl: restored.imgDataUrl || null,
            flipped: restored.flipped || false
          });
          renderTrash();
          render();
        } else if (act === "remove"){
          state.trash.splice(state.trash.indexOf(item),1);
          renderTrash();
          updateHeader();
        }
      });
      trashList.appendChild(card);
    }
  }

  $("#btnAdd").addEventListener("click", () => {
    state.tiles.push({id: state.tiles.length+1, _uid: uid(), name:"", text:"", imgDataUrl:null, flipped:false});
    render();
  });
  $("#btnRenumber").addEventListener("click", () => { normalizeIds(); render(); });
  $("#btnSmaller").addEventListener("click", () => { applyTileSize(state.tileSize - 10); render(); });
  $("#btnBigger").addEventListener("click", () => { applyTileSize(state.tileSize + 10); render(); });
  $("#btnAllPhoto").addEventListener("click", () => { state.tiles.forEach(t => t.flipped=false); render(); });
  $("#btnAllText").addEventListener("click", () => { state.tiles.forEach(t => t.flipped=true); render(); });

  $("#btnSave").addEventListener("click", exportJson);
  $("#btnLoad").addEventListener("click", () => { fileLoader.value=""; fileLoader.click(); });

  // Start-link (GitHub Pages of your own repo)
  btnStartLink.addEventListener("click", async () => {
    const key = "FTA_GITHUB_START_URL";
    let url = localStorage.getItem(key) || "";
    const entered = prompt("Plak hier je GitHub Pages start-URL (bijv. https://<naam>.github.io/<repo>/)\n\nLeeg laten = alleen kopieer huidige pagina-URL.", url);
    if (entered === null) return;
    url = (entered || "").trim();
    if (url) localStorage.setItem(key, url); else localStorage.removeItem(key);
    const toCopy = url || location.href;
    try { await navigator.clipboard.writeText(toCopy); alert("Start-link gekopieerd naar klembord."); }
    catch { alert("Kon niet kopiëren. Link:\n" + toCopy); }
  });

  fileLoader.addEventListener("change", async (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) await importJsonFile(f);
  });

  photoLoader.addEventListener("change", async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f || pendingPhotoTileId == null) return;
    const t = state.tiles.find(x => x.id === pendingPhotoTileId);
    pendingPhotoTileId = null;
    if (!t) return;
    try{
      t.imgDataUrl = await fileToDataUrl(f);
      t.flipped = false;
      render();
    }catch{
      alert("Foto kon niet worden geladen.");
    }
  });

  function init(){
    applyTileSize(DEFAULT_TILE);
    state.tiles = [{id:1, _uid:uid(), name:"", text:"", imgDataUrl:null, flipped:false}];
    render();
  }
  init();

  // live search
  [nrSearch, nameSearch, textSearch].forEach(inp => inp.addEventListener("input", render));
})();
</script>
</body>
</html>
